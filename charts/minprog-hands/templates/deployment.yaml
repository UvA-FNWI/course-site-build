apiVersion: apps/v1
kind: Deployment
metadata:
  name: hands
  namespace: "{{ .Release.Namespace }}"
spec:
  selector:
    matchLabels:
      app: hands
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: hands
        {{- if .Values.azure }}
        aadpodidbinding: hands-azure-kv
        {{- end }}
    spec:
      containers:
        - name: hands
          image: "{{ .Values.image }}:{{ .Values.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # Override HTTP_PORT and TARGET_PORT for server
            - name: HTTP_PORT
              value: "3000"
            - name: TARGET_PORT
              value: "3001"
            - name: HANDS_DEPLOYMENT_VERSION
              value: "{{ .Chart.AppVersion }}"
            - name: HANDS_DEPLOYMENT_VERSION_TAG
              value: "{{ .Values.tag }}"
            - name: RAILS_ENV
              value: production
            - name: RAILS_LOG_TO_STDOUT
              value: "true"
            - name: OIDC_HOST
              value: "{{ .Values.oidc.host }}"
            - name: OIDC_CLIENT_ID
              value: "{{ .Values.oidc.clientId }}"
            - name: MAILER_ADDRESS
              value: "{{ .Values.mail.address }}"
            - name: MAILER_DOMAIN
              value: "{{ .Values.mail.domain }}"
            - name: MAILER_FROM
              value: "{{ .Values.mail.from }}"
            - name: DATABASE_URL
              value: "{{ .Values.database.url }}"
            - name: DATABASE_NAME
              value: "{{ .Values.database.name }}"
            - name: DATABASE_USER
              value: "{{ .Values.database.user }}"
          envFrom:
            - secretRef:
                name: hands-secret
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/etc/secrets"
              readOnly: true

      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "hands-secretproviderclass"
